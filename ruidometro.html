<!DOCTYPE html>
<html>
<head>
  <title>Ruidómetro Rana 🐸</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #e8f5e9;
    }
    #frog {
      width: 150px;
      position: relative;
      top: 0;
      transition: top 0.2s;
    }
    #bar {
      width: 300px;
      height: 20px;
      background: lightgray;
      margin: 20px auto;
    }
    #level {
      height: 100%;
      width: 0%;
      background: green;
    }
  </style>
</head>
<body>

<h1>🐸 Protege a la rana</h1>

<img id="frog" src="https://i.imgur.com/4AiXzf8.png">

<div id="bar">
  <div id="level"></div>
</div>

<p id="msg">Silencio 😊</p>

<script>
navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
  const audioContext = new AudioContext();
  const mic = audioContext.createMediaStreamSource(stream);
  const analyser = audioContext.createAnalyser();
  mic.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  function update() {
    analyser.getByteFrequencyData(data);
    let volume = data.reduce((a,b) => a+b) / data.length;

    document.getElementById("level").style.width = volume + "%";

    if (volume > 50) {
      document.getElementById("frog").style.top = "-200px";
      document.getElementById("msg").innerText = "¡Mucho ruido! 😡";
    } else {
      document.getElementById("frog").style.top = "0px";
      document.getElementById("msg").innerText = "Silencio 😊";
    }

    requestAnimationFrame(update);
  }

  update();
});
</script>

</body>
</html>
